<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foodie - Order Food, Discover Restaurants</title>
    <!-- Google Fonts for Modern Typography -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fa-solid fa-burger" style="color: var(--primary-color);"></i>
                Foodie
            </div>
            <div class="nav-links">
                <a href="#" class="nav-item active" data-page="home">Home</a>
                <a href="#" class="nav-item" data-page="about">About</a>
                <a href="#" class="nav-item" data-page="partner">Partner with us</a>
            </div>
            <div class="nav-actions">
                <button class="btn btn-outline" id="cartBtn" style="display: none;">
                    <i class="fa-solid fa-cart-shopping"></i> <span id="cartCount">0</span>
                </button>
                <div class="user-menu" id="userMenuToggle" style="display: none; align-items: center; gap: 15px;">
                    <span id="navUserName" style="font-weight: bold; margin-right: 5px;">User</span>
                    <button class="btn btn-outline" id="menuDashboard"
                        style="padding: 6px 12px; font-size: 0.85rem;">Dashboard</button>
                    <button class="btn btn-outline" id="menuOrders" style="padding: 6px 12px; font-size: 0.85rem;">My
                        Orders</button>
                    <button class="btn btn-primary" id="menuLogout"
                        style="padding: 6px 12px; font-size: 0.85rem;">Logout</button>
                </div>
                <!-- Guest View -->
                <button class="btn btn-filled" id="navSignInBtn">Sign In</button>
            </div>
        </div>
    </nav>

    <!-- Main Content Container for SPA -->
    <main id="appContent">
        <!-- Rendered dynamcially via JS -->
    </main>

    <!-- Templates -->
    <!-- Template: Hero Section (Home) -->
    <template id="tpl-home">
        <section class="hero-section">
            <div class="hero-content">
                <h1>Order food. Discover the best restaurants. <span class="text-primary">Foodie it!</span></h1>
                <div class="search-box">
                    <div class="input-group">
                        <i class="fa-solid fa-location-dot"></i>
                        <select class="location-select">
                            <option>New York</option>
                            <option>San Francisco</option>
                            <option>Seattle</option>
                        </select>
                    </div>
                    <div class="input-divider"></div>
                    <div class="input-group search-input">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search for restaurants, dishes or cuisines...">
                    </div>
                    <button class="btn btn-primary btn-search">FIND FOOD</button>
                </div>
            </div>
        </section>

        <!-- Main Feature Section: Interactive Promo Card -->
        <section class="feature-section">
            <div class="container">
                <div class="promo-card">
                    <div class="promo-info">
                        <h2>Food Delivery</h2>
                        <p>From strictly verified restaurants</p>
                        <div class="badge">Up to 60% OFF</div>
                        <button class="btn btn-circle"><i class="fa-solid fa-arrow-right"></i></button>
                    </div>
                    <div class="promo-image-container">
                        <img src="https://images.unsplash.com/photo-1550547660-d9450f859349?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80"
                            alt="Delicious Burger" class="promo-img">
                    </div>
                </div>
            </div>
        </section>

        <!-- Menu Section -->
        <section class="menu-section container" id="publicMenuSection">
            <div class="section-header">
                <h2>Popular Dishes</h2>
                <div class="filters">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="Veg"><i class="fa-solid fa-leaf text-success"></i>
                        Veg</button>
                    <button class="filter-btn" data-filter="Non-Veg"><i
                            class="fa-solid fa-drumstick-bite text-danger"></i> Non-Veg</button>
                </div>
            </div>
            <div class="food-grid" id="foodGrid">
                <!-- Food items will be rendered here -->
            </div>
        </section>
    </template>

    <!-- Authentication Modal/Page -->
    <template id="tpl-auth">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h2 id="authTitle">Sign In</h2>
                    <p id="authSubtitle">Or create an account to start ordering.</p>
                </div>

                <form id="authForm">
                    <div class="form-group" id="nameGroup" style="display: none;">
                        <label>Full Name</label>
                        <input type="text" id="authName" placeholder="Enter your name">
                    </div>
                    <div class="form-group" id="addressGroup" style="display: none;">
                        <label>Delivery Address</label>
                        <textarea id="authAddress" placeholder="Enter your full address" rows="2"
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;"></textarea>
                    </div>
                    <div class="form-group" id="roleGroup" style="display: none;">
                        <label>Role</label>
                        <select id="authRole">
                            <option value="customer">Customer</option>
                            <option value="owner">Restaurant Owner</option>
                            <option value="delivery">Delivery Boy</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="authEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="authPassword" placeholder="Enter password" required>
                    </div>
                    <div class="form-group" id="phoneGroup" style="display: none;">
                        <label>Phone Number (Delivery only)</label>
                        <input type="text" id="authPhone" placeholder="Enter phone number">
                    </div>
                    <button type="submit" class="btn btn-primary w-100" id="authSubmitBtn">Sign In</button>
                </form>

                <div class="auth-footer">
                    <span id="authSwitchText">Don't have an account? <a href="#" id="authSwitchBtn">Register</a></span>
                </div>
            </div>
        </div>
    </template>

    <!-- Food Card Template (Used inside JS) -->
    <template id="tpl-food-card">
        <div class="food-card">
            <div class="food-img-wrapper">
                <img src="" alt="Food" class="food-img">
                <button class="btn btn-circle btn-wishlist"><i class="fa-regular fa-heart"></i></button>
            </div>
            <div class="food-body">
                <div class="food-header">
                    <h3 class="food-title">Burger</h3>
                    <span class="food-cat"><i class="fa-solid fa-circle"></i></span>
                </div>
                <p class="food-desc">Description</p>
                <div class="food-footer">
                    <span class="food-price">₹10</span>
                    <button class="btn btn-outline btn-add">Add <i class="fa-solid fa-plus"></i></button>
                </div>
            </div>
        </div>
    </template>

    <!-- Cart / Checkout Template -->
    <template id="tpl-cart">
        <div class="container mt-20" style="padding: 20px;">
            <div class="card" style="max-width: 800px; margin: 0 auto;">
                <h2>Your Cart</h2>
                <div id="cartItemsList" style="margin-top: 20px;"></div>
                <div id="cartTotalSummary"
                    style="margin-top: 20px; text-align: right; font-size: 1.2rem; font-weight: bold;">
                    Total: ₹<span id="cartTotalPrice">0</span>
                </div>
                <div style="margin-top: 20px; text-align: right;">
                    <button class="btn btn-primary" id="btnPlaceOrder">Place Order</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Customer Orders Template -->
    <template id="tpl-customer-orders">
        <div class="container mt-20" style="padding: 20px;">
            <h2>My Orders</h2>
            <div id="customerOrdersList" style="margin-top: 20px;"></div>
        </div>
    </template>

    <!-- Owner Dashboard Template -->
    <template id="tpl-owner-dashboard">
        <div class="dashboard-layout">
            <div class="sidebar">
                <div class="sidebar-item active" data-tab="owner-menu"><i class="fa-solid fa-utensils"></i> Manage Menu
                </div>
                <div class="sidebar-item" data-tab="owner-orders"><i class="fa-solid fa-clipboard-list"></i> Manage
                    Orders</div>
                <div class="sidebar-item" data-tab="owner-delivery"><i class="fa-solid fa-motorcycle"></i> Delivery Boys
                </div>
                <div class="sidebar-item" data-tab="owner-requests"><i class="fa-solid fa-envelope"></i> Requests <span
                        id="reqBadge" class="badge"
                        style="background:var(--danger);color:white;padding:2px 6px;margin-left:5px;display:none;">New</span>
                </div>
            </div>
            <div class="dashboard-content">
                <!-- Manage Menu Tab -->
                <div id="owner-menu" class="tab-content">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Manage Menu</h2>
                        <button class="btn btn-primary" id="btnShowAddFood">Add New Item</button>
                    </div>

                    <div class="card" id="addFoodFormCard" style="display: none;">
                        <h3>Add Food Item</h3>
                        <form id="addFoodForm" style="margin-top: 15px;">
                            <div class="form-group"><input type="text" id="afName" placeholder="Item Name" required>
                            </div>
                            <div class="form-group"><input type="number" id="afPrice" placeholder="Price ($)"
                                    step="0.01" required></div>
                            <div class="form-group"><input type="text" id="afDesc" placeholder="Description"></div>
                            <div class="form-group">
                                <select id="afCat" required>
                                    <option value="Veg">Veg</option>
                                    <option value="Non-Veg">Non-Veg</option>
                                </select>
                            </div>
                            <div class="form-group"><input type="text" id="afType"
                                    placeholder="Type (Starter, Main Course...)" required></div>
                            <div class="form-group"><input type="text" id="afImage" placeholder="Image URL"></div>
                            <button type="submit" class="btn btn-primary">Save Item</button>
                            <button type="button" class="btn btn-outline"
                                onclick="document.getElementById('addFoodFormCard').style.display='none'">Cancel</button>
                        </form>
                    </div>

                    <div class="card">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Category</th>
                                    <th>Price</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="ownerFoodList"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Manage Orders Tab -->
                <div id="owner-orders" class="tab-content" style="display: none;">
                    <h2>Manage Orders</h2>
                    <div id="ownerOrdersDiv" style="margin-top: 20px;"></div>
                </div>

                <!-- Delivery Boys Tab -->
                <div id="owner-delivery" class="tab-content" style="display: none;">
                    <div
                        style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                        <h2>Delivery Boys</h2>
                        <button class="btn btn-primary" id="btnShowAddDel">Add Delivery Boy</button>
                    </div>

                    <div class="card" id="addDelFormCard" style="display: none;">
                        <h3>Add Delivery Boy</h3>
                        <form id="addDelForm" style="margin-top: 15px;">
                            <div class="form-group"><input type="text" id="adName" placeholder="Name" required></div>
                            <div class="form-group"><input type="email" id="adEmail" placeholder="Email" required></div>
                            <div class="form-group"><input type="password" id="adPassword" placeholder="Password"
                                    required></div>
                            <div class="form-group"><input type="text" id="adPhone" placeholder="Phone" required></div>
                            <button type="submit" class="btn btn-primary">Add</button>
                        </form>
                    </div>

                    <div class="card">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Phone</th>
                                </tr>
                            </thead>
                            <tbody id="ownerDelList"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Join Requests Tab -->
                <div id="owner-requests" class="tab-content" style="display: none;">
                    <h2>Delivery Boy Requests</h2>
                    <div class="card" style="margin-top: 20px;">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Delivery Boy Name</th>
                                    <th>Phone Number</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="ownerReqList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <!-- Delivery Dashboard Template -->
    <template id="tpl-delivery-dashboard">
        <div class="dashboard-layout">
            <div class="sidebar">
                <div class="sidebar-item active" data-tab="del-orders"><i class="fa-solid fa-box"></i> Active Orders
                </div>
                <div class="sidebar-item" data-tab="del-join"><i class="fa-solid fa-store"></i> Join Restaurants</div>
            </div>
            <div class="dashboard-content">
                <div id="del-orders" class="tab-content">
                    <h2>Assigned Deliveries</h2>
                    <div id="deliveryOrdersDiv" style="margin-top: 20px;"></div>
                </div>
                <div id="del-join" class="tab-content" style="display: none;">
                    <h2>Request to Join Restaurants</h2>
                    <p style="margin-bottom: 15px; color: var(--text-light);">Send a request to restaurant owners to
                        start delivering their orders.</p>
                    <div class="card">
                        <table class="admin-table">
                            <thead>
                                <tr>
                                    <th>Restaurant (Owner Name)</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="deliveryOwnersList"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </template>

    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>

</html>
